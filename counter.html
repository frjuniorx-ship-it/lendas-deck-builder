<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>L&B — Contador de Pontos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Archivo:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#0e0e0e;color:#c4a853;font-family:'Cinzel',serif;touch-action:manipulation;-webkit-user-select:none;user-select:none}
:root{--gold:#c4a853;--gold2:rgba(196,168,83,.35);--gold3:rgba(196,168,83,.1);--bg:#0e0e0e;--bg2:#161616;--red:#c2503f;--green:#5aa06f}

/* ── SETUP ── */
#s-setup{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:24px;gap:18px}
.back-link{position:absolute;top:14px;left:16px;font-size:11px;letter-spacing:.1em;color:var(--gold2);text-decoration:none;text-transform:uppercase}
.setup-eye{width:52px;height:52px;object-fit:contain}
.setup-title{font-size:clamp(15px,3.8vw,22px);text-align:center;letter-spacing:.12em;text-transform:uppercase;line-height:1.4;max-width:380px}
.preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:min(320px,88vw)}
.preset-btn{aspect-ratio:1;background:var(--bg2);border:1.5px solid var(--gold2);border-radius:6px;color:var(--gold);font-family:'Cinzel',serif;font-size:clamp(34px,9vw,52px);font-weight:700;cursor:pointer;transition:background .12s,border-color .12s;outline:none}
.preset-btn.sel,.preset-btn:active{background:var(--gold3);border-color:var(--gold)}
.custom-row{display:flex;align-items:center;gap:12px;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold2)}
.custom-in{width:72px;background:var(--bg2);border:1px solid var(--gold2);border-radius:4px;color:var(--gold);font-family:'Cinzel',serif;font-size:20px;text-align:center;padding:6px;outline:none}
.custom-in::placeholder{color:rgba(196,168,83,.25)}
.timer-row{display:flex;align-items:center;gap:12px;font-size:12px;letter-spacing:.1em;text-transform:uppercase}
.tog{padding:5px 18px;border:1.5px solid var(--gold2);border-radius:20px;background:transparent;color:var(--gold2);font-family:'Cinzel',serif;font-size:12px;cursor:pointer;transition:all .15s;min-width:58px}
.tog.on{border-color:var(--gold);color:var(--gold);background:var(--gold3)}
.play-btn{padding:13px 56px;background:linear-gradient(135deg,#9a7520,#c4a853,#9a7520);border:none;border-radius:30px;color:#1a120a;font-family:'Cinzel',serif;font-size:18px;font-weight:700;letter-spacing:.18em;cursor:pointer;margin-top:4px}

/* ── GAME ── */
#s-game{display:none;flex-direction:column;height:100vh;width:100vw}
.parea{flex:1;min-height:0;display:flex;flex-direction:column;align-items:center;justify-content:space-evenly;padding:10px 16px;position:relative;transition:background .3s}
.parea.flip{transform:rotate(180deg)}
.parea.myturn{background:rgba(196,168,83,.04)}

.chev{width:clamp(44px,11vw,58px);height:clamp(44px,11vw,58px);border-radius:50%;border:2px solid var(--gold2);background:transparent;color:var(--gold2);font-size:clamp(16px,4vw,22px);cursor:pointer;display:flex;align-items:center;justify-content:center;outline:1px solid rgba(196,168,83,.12);outline-offset:3px;transition:all .2s;-webkit-tap-highlight-color:transparent}
.chev.on{border-color:var(--gold);color:var(--gold);background:var(--gold3);outline-color:rgba(196,168,83,.3)}

.pc-row{display:flex;align-items:center;gap:clamp(12px,5vw,36px)}
.pc-btn{width:clamp(58px,15vw,76px);height:clamp(58px,15vw,76px);border-radius:50%;border:2px solid var(--gold);background:transparent;color:var(--gold);font-size:clamp(28px,7vw,38px);line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;outline:1px solid var(--gold2);outline-offset:4px;-webkit-tap-highlight-color:transparent;transition:background .1s}
.pc-btn:active{background:var(--gold3)}
.pc-num{font-size:clamp(80px,20vw,120px);font-weight:700;line-height:1;min-width:2.6ch;text-align:center;color:var(--gold)}

.delta{font-size:clamp(20px,5vw,28px);font-weight:500;height:36px;text-align:center;opacity:0;transition:opacity .4s;letter-spacing:.05em}
.delta.show{opacity:1}
.delta.pos{color:var(--green)}
.delta.neg{color:var(--red)}

.timer{font-size:clamp(15px,3.8vw,20px);letter-spacing:.14em;font-variant-numeric:tabular-nums;border:1.5px solid var(--gold2);border-radius:4px;padding:4px 14px;min-width:84px;text-align:center;transition:color .3s,border-color .3s}
.timer.red{color:var(--red);border-color:var(--red)}

/* ── CENTER DIVIDER ── */
#center{flex:none;height:54px;display:flex;align-items:center;justify-content:center;position:relative;border-top:1px solid var(--gold2);border-bottom:1px solid var(--gold2);background:repeating-linear-gradient(90deg,rgba(196,168,83,.06) 0,rgba(196,168,83,.06) 3px,transparent 3px,transparent 10px)}
#eye-btn{width:50px;height:50px;border-radius:50%;background:var(--bg);border:2px solid var(--gold2);cursor:pointer;padding:5px;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;transition:border-color .2s}
#eye-btn:active{border-color:var(--gold)}
#eye-btn img{width:100%;height:100%;object-fit:contain}
#eye-fb{font-size:22px;color:var(--gold2);display:none}

/* ── MODAL ── */
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);align-items:center;justify-content:center;z-index:99}
.modal-box{background:var(--bg2);border:1.5px solid var(--gold);border-radius:14px;padding:28px 32px;text-align:center;max-width:290px;width:90%}
.modal-box p{font-size:15px;letter-spacing:.1em;text-transform:uppercase;line-height:1.6;margin-bottom:22px;color:var(--gold)}
.modal-actions{display:flex;gap:10px;justify-content:center}
.btn-yes{padding:10px 22px;background:var(--gold3);border:1.5px solid var(--gold);border-radius:8px;color:var(--gold);font-family:'Cinzel',serif;font-size:13px;cursor:pointer}
.btn-no{padding:10px 22px;background:transparent;border:1.5px solid var(--gold2);border-radius:8px;color:var(--gold2);font-family:'Cinzel',serif;font-size:13px;cursor:pointer}
</style>
</head>
<body>

<!-- ══════════════ SETUP ══════════════ -->
<div id="s-setup">
  <a class="back-link" href="./index.html">← Deck Builder</a>
  <img class="setup-eye" src="./Logo.png" alt="L&B" id="setup-logo"
    onerror="this.style.display='none'">
  <h1 class="setup-title">Selecione a pontuação inicial da partida</h1>

  <div class="preset-grid">
    <button class="preset-btn sel" onclick="pick(20,this)">20</button>
    <button class="preset-btn"     onclick="pick(30,this)">30</button>
    <button class="preset-btn"     onclick="pick(40,this)">40</button>
    <button class="preset-btn"     onclick="pick(50,this)">50</button>
  </div>

  <div class="custom-row">
    <span>Outra pontuação</span>
    <input class="custom-in" id="custom-in" type="number" min="1" max="999"
      placeholder="…" oninput="pickCustom(this.value)">
  </div>

  <div class="timer-row">
    <span>Cronômetro de turno</span>
    <button class="tog on" id="tog-timer" onclick="toggleTimer()">ON</button>
  </div>

  <button class="play-btn" onclick="startGame()">JOGAR</button>
</div>

<!-- ══════════════ GAME ══════════════ -->
<div id="s-game">

  <!-- Jogador 0 — topo, rotacionado 180° -->
  <div class="parea flip" id="p0">
    <button class="chev" id="p0-chev" onclick="setTurn(0)">❯❯</button>
    <div class="delta" id="p0-delta"></div>
    <div class="pc-row">
      <button class="pc-btn"
        onmousedown="hold(0,1)"  onmouseup="stopHold"  onmouseleave="stopHold"
        ontouchstart="hold(0,1)" ontouchend="stopHold" ontouchcancel="stopHold">+</button>
      <span class="pc-num" id="p0-num">20</span>
      <button class="pc-btn"
        onmousedown="hold(0,-1)"  onmouseup="stopHold"  onmouseleave="stopHold"
        ontouchstart="hold(0,-1)" ontouchend="stopHold" ontouchcancel="stopHold">−</button>
    </div>
    <div class="timer" id="p0-timer">02:00</div>
  </div>

  <!-- Divisor central com olho -->
  <div id="center">
    <button id="eye-btn" onclick="openModal()">
      <img src="./Logo.png" alt="reset"
        onerror="this.style.display='none';document.getElementById('eye-fb').style.display='block'">
      <span id="eye-fb">↺</span>
    </button>
  </div>

  <!-- Jogador 1 — baixo, normal -->
  <div class="parea" id="p1">
    <button class="chev on" id="p1-chev" onclick="setTurn(1)">❯❯</button>
    <div class="delta" id="p1-delta"></div>
    <div class="pc-row">
      <button class="pc-btn"
        onmousedown="hold(1,1)"  onmouseup="stopHold"  onmouseleave="stopHold"
        ontouchstart="hold(1,1)" ontouchend="stopHold" ontouchcancel="stopHold">+</button>
      <span class="pc-num" id="p1-num">20</span>
      <button class="pc-btn"
        onmousedown="hold(1,-1)"  onmouseup="stopHold"  onmouseleave="stopHold"
        ontouchstart="hold(1,-1)" ontouchend="stopHold" ontouchcancel="stopHold">−</button>
    </div>
    <div class="timer" id="p1-timer">02:00</div>
  </div>

</div>

<!-- ══════════════ MODAL ══════════════ -->
<div id="modal" onclick="closeModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <p>Resetar a partida?<br>Esta ação não pode ser desfeita.</p>
    <div class="modal-actions">
      <button class="btn-yes" onclick="doReset()">Resetar</button>
      <button class="btn-no"  onclick="closeModal()">Cancelar</button>
    </div>
  </div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
let cfg = { startPc: 20, useTimer: true };

// ── State ─────────────────────────────────────────────────────────────────────
let players, tickId, holdTimerId, holdIntId;

function initPlayers() {
  players = [0, 1].map(() => ({
    pc: cfg.startPc,
    deltaAcc: 0,
    deltaTimerId: null,
  }));
}

// ── Setup ─────────────────────────────────────────────────────────────────────
function pick(val, el) {
  cfg.startPc = val;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('sel'));
  el.classList.add('sel');
  document.getElementById('custom-in').value = '';
}

function pickCustom(v) {
  const n = parseInt(v);
  if (n > 0) {
    cfg.startPc = n;
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('sel'));
  }
}

function toggleTimer() {
  cfg.useTimer = !cfg.useTimer;
  const b = document.getElementById('tog-timer');
  b.textContent = cfg.useTimer ? 'ON' : 'OFF';
  b.classList.toggle('on', cfg.useTimer);
}

function startGame() {
  initPlayers();
  clearInterval(tickId);

  // Render initial values
  [0, 1].forEach(i => {
    document.getElementById(`p${i}-num`).textContent = cfg.startPc;
    const t = document.getElementById(`p${i}-timer`);
    t.textContent = '02:00';
    t.classList.remove('red');
    t.style.display = cfg.useTimer ? '' : 'none';
    const d = document.getElementById(`p${i}-delta`);
    d.textContent = '';
    d.className = 'delta';
  });

  // Player 1 starts (bottom) — activate chevron visually, start timer
  setTurnVisual(1);
  if (cfg.useTimer) {
    players[1].timerSec = 120;
    players[1].timerActive = true;
    players[0].timerSec = 120;
    players[0].timerActive = false;
    tickId = setInterval(tick, 1000);
  }

  document.getElementById('s-setup').style.display = 'none';
  document.getElementById('s-game').style.display = 'flex';
}

// ── Game ──────────────────────────────────────────────────────────────────────
function setTurn(idx) {
  const other = 1 - idx;

  // Reset the OTHER player's timer back to 2:00 and stop it
  if (cfg.useTimer) {
    players[other].timerSec = 120;
    players[other].timerActive = false;
    const otherEl = document.getElementById(`p${other}-timer`);
    otherEl.textContent = '02:00';
    otherEl.classList.remove('red');

    // Start this player's timer
    players[idx].timerSec = 120;
    players[idx].timerActive = true;
    const idxEl = document.getElementById(`p${idx}-timer`);
    idxEl.textContent = '02:00';
    idxEl.classList.remove('red');
  }

  setTurnVisual(idx);
}

function setTurnVisual(idx) {
  [0, 1].forEach(i => {
    document.getElementById(`p${i}`).classList.toggle('myturn', i === idx);
    document.getElementById(`p${i}-chev`).classList.toggle('on', i === idx);
  });
}

function tick() {
  [0, 1].forEach(i => {
    const p = players[i];
    if (!p.timerActive || p.timerSec <= 0) return;
    p.timerSec--;
    const el = document.getElementById(`p${i}-timer`);
    const m = String(Math.floor(p.timerSec / 60)).padStart(2, '0');
    const s = String(p.timerSec % 60).padStart(2, '0');
    el.textContent = `${m}:${s}`;
    if (p.timerSec === 0) {
      el.classList.add('red');
      p.timerActive = false;
    }
  });
}

function changePC(idx, delta) {
  players[idx].pc += delta;
  players[idx].deltaAcc = (players[idx].deltaAcc || 0) + delta;

  document.getElementById(`p${idx}-num`).textContent = players[idx].pc;

  const acc = players[idx].deltaAcc;
  const el = document.getElementById(`p${idx}-delta`);
  el.textContent = (acc > 0 ? '+' : '') + acc;
  el.className = 'delta show ' + (acc >= 0 ? 'pos' : 'neg');

  clearTimeout(players[idx].deltaTimerId);
  players[idx].deltaTimerId = setTimeout(() => {
    el.classList.remove('show');
    players[idx].deltaAcc = 0;
  }, 2000);
}

// Hold-to-repeat
function hold(idx, delta) {
  changePC(idx, delta);
  holdTimerId = setTimeout(() => {
    holdIntId = setInterval(() => changePC(idx, delta), 90);
  }, 450);
}
function stopHold() {
  clearTimeout(holdTimerId);
  clearInterval(holdIntId);
}

// ── Reset ─────────────────────────────────────────────────────────────────────
function openModal()  { document.getElementById('modal').style.display = 'flex'; }
function closeModal() { document.getElementById('modal').style.display = 'none'; }

function doReset() {
  closeModal();
  clearInterval(tickId);
  startGame();
  // startGame hides setup and shows game again, so keep game visible
  document.getElementById('s-setup').style.display = 'none';
  document.getElementById('s-game').style.display = 'flex';
}
</script>
</body>
</html>
