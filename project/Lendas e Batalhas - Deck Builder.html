document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

border-radius:8px;color:var(--text);padding:11px;font-family:ui-monospace,Menlo,monospace;font-size:12px;line-height:1.55;resize:vertical;outline:none\"><\u002Ftextarea>\n          <div style=\"display:flex;justify-content:flex-end;margin-top:12px\"><button onclick=\"{{ copyExport }}\" style=\"background:var(--gold,#c79a48);color:#1a130a;border:none;border-radius:8px;padding:9px 18px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit\">{{ copyLabel }}<\u002Fbutton><\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ isImport }}\" hint-placeholder-val=\"{{ true }}\">\n          <p style=\"font-size:12px;color:var(--muted);margin:0 0 10px\">Cole uma lista no formato <b style=\"color:var(--text)\">3x Boitatá<\u002Fb> (uma por linha). Um novo baralho será criado.<\u002Fp>\n          <textarea value=\"{{ importText }}\" onchange=\"{{ onImportText }}\" placeholder=\"3x Boitatá\n2x Vitória-régia\n1x D. João III\" style=\"width:100%;min-height:230px;background:var(--bg);border:1px solid var(--line);border-radius:8px;color:var(--text);padding:11px;font-family:ui-monospace,Menlo,monospace;font-size:12px;line-height:1.55;resize:vertical;outline:none\"><\u002Ftextarea>\n          <sc-if value=\"{{ hasImportMsg }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"margin-top:9px;font-size:12px;color:{{ importMsgColor }}\">{{ importMsgText }}<\u002Fdiv><\u002Fsc-if>\n          <div style=\"display:flex;justify-content:flex-end;gap:8px;margin-top:12px\"><button onclick=\"{{ closeModal }}\" style=\"background:transparent;color:var(--text);border:1px solid var(--line);border-radius:8px;padding:9px 16px;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit\">Cancelar<\u002Fbutton><button onclick=\"{{ doImport }}\" style=\"background:var(--gold,#c79a48);color:#1a130a;border:none;border-radius:8px;padding:9px 18px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit\">Importar<\u002Fbutton><\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:840},&quot;corOuro&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#bea356&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;corPauBrasil&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#b14a3c&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  static CATS = ['Folclóricos','Históricos','Apoios','Feras','Plantas'];\n  static CATC = {'Folclóricos':'#c2503f','Históricos':'#c79a48','Apoios':'#8a72b8','Feras':'#c47a3a','Plantas':'#5aa06f'};\n  static RARS = ['Comum','Raro','Super raro','Ultra raro','Lendário'];\n  static RARC = {'Comum':'#9b9384','Raro':'#5f8fb0','Super raro':'#8a72b8','Ultra raro':'#c79a48','Lendário':'#c2503f'};\n  static MAXC = {'Comum':4,'Raro':3,'Super raro':2,'Ultra raro':2,'Lendário':1};\n  static COLS = ['DESCOBRIMENTO','EXPEDIÇÕES SECRETAS'];\n  static MIN = 40; static MAX = 80; static KEY = 'lb_decks_v1';\n\n  state = { loading:true, view:'home', cards:[], byId:{}, decks:[], editingIdx:-1,\n    search:'', fCat:'Todas', fRar:'Todas', fCol:'Todas', fPc:'Todas',\n    expanded:{}, modal:null, importText:'', importMsg:null, copied:false,\n    imgMap:null, isMobile:false, tab:'catalog' };\n\n  async componentDidMount(){\n    this._mq = ()=>this.setState({ isMobile: window.innerWidth < 880 });\n    window.addEventListener('resize', this._mq);\n\n    // 1) Catálogo + baralhos exemplo: lb-data.js (sempre carrega, offline-friendly)\n    let mod=null;\n    try { mod = await import(window.__resources && window.__resources.lbData ? window.__resources.lbData : './lb-data.js'); } catch(e){ console.error('lb-data load failed', e); }\n    const cards = (mod && mod.CARDS) ? mod.CARDS.map(c => ({...c})) : [];\n    const byId = {}; cards.forEach(c => byId[c.id] = c);\n    let decks = null;\n    try { const s = localStorage.getItem(Component.KEY); if(s) decks = JSON.parse(s); } catch(e){}\n    if(!decks){\n      decks = ((mod && mod.SEED_DECKS) || []).map(d => ({ nome:d.nome, fav:false, isExample:true, cards:d.cards.map(c=>({id:c.id, qty:c.qty})) }));\n    }\n    this.setState({ loading:false, cards, byId, decks, isMobile: window.innerWidth < 880 });\n\n    // 2) Enriquecer com imagens da API (best-effort, pode falhar por CORS sem quebrar o app)\n    try {\n      const res = await fetch('https://www.lendasebatalhas.com.br/wp-json/lendas/v1/cartas');\n      if(!res.ok) throw new Error('HTTP ' + res.status);\n      const apiCards = await res.json();\n      const norm = s => (s||'').toLowerCase().normalize('NFD').replace(/[\\u0300-\\u036f]/g,'').trim();\n      const nameMap = {};\n      apiCards.forEach(ac => { if(ac.nome) nameMap[norm(ac.nome)] = ac; });\n      let filled = 0;\n      cards.forEach(c => {\n        const apiData = nameMap[norm(c.nome)];\n        if(apiData && apiData.imagem_url){\n          c.imagem_url = apiData.imagem_url;\n          if(byId[c.id]) byId[c.id].imagem_url = apiData.imagem_url;\n          filled++;\n        }\n      });\n      if(filled > 0){ console.log('Imagens API: ' + filled + '/' + cards.length); this.forceUpdate(); }\n    } catch(e){\n      console.warn('API de imagens indisponível (CORS?):', e.message || e);\n    }\n  }\n\n\n  normName(s){ return (s||'').toLowerCase().normalize('NFD').replace(/[\\u0300-\\u036f]/g,'').replace(/[^a-z0-9]/g,''); }\n  componentWillUnmount(){ if(this._mq) window.removeEventListener('resize', this._mq); }\n\n  persist(decks){ try{ localStorage.setItem(Component.KEY, JSON.stringify(decks)); }catch(e){} }\n  updateDecks(decks){ this.persist(decks); this.setState({ decks }); }\n  curDeck(){ return this.state.decks[this.state.editingIdx]; }\n  total(d){ return d.cards.reduce((s,c)=>s+c.qty,0); }\n  maxCopies(card){ return Component.MAXC[card.raridade] || 3; }\n\n  mutateCur(fn){\n    const decks = this.state.decks.slice();\n    const d = { ...decks[this.state.editingIdx] };\n    d.cards = d.cards.map(c=>({ ...c }));\n    fn(d);\n    decks[this.state.editingIdx] = d;\n    this.updateDecks(decks);\n  }\n  add(id){ this.mutateCur(d=>{ const e=d.cards.find(c=>c.id===id); if(e){ const mx=this.maxCopies(this.state.byId[id]); if(e.qty<mx) e.qty++; } else d.cards.push({id,qty:1}); }); }\n  inc(id){ this.add(id); }\n  dec(id){ this.mutateCur(d=>{ const e=d.cards.find(c=>c.id===id); if(e){ e.qty--; if(e.qty<=0) d.cards=d.cards.filter(c=>c.id!==id); } }); }\n  setQ(id,q){ this.mutateCur(d=>{ if(q<=0){ d.cards=d.cards.filter(c=>c.id!==id); } else { const e=d.cards.find(c=>c.id===id); if(e) e.qty=q; else d.cards.push({id,qty:q}); } }); }\n  rename(v){ this.mutateCur(d=>{ d.nome=v; }); }\n\n  newDeck(){\n    const decks=this.state.decks.slice();\n    decks.push({ nome:'Novo Baralho', fav:false, isExample:false, cards:[] });\n    this.persist(decks);\n    this.setState({ decks, view:'builder', editingIdx:decks.length-1, tab:'catalog', search:'', fCat:'Todas', fRar:'Todas', fCol:'Todas', fPc:'Todas' });\n  }\n  duplicate(idx){\n    const decks=this.state.decks.slice(); const src=decks[idx];\n    decks.splice(idx+1,0,{ nome:src.nome+' (cópia)', fav:false, isExample:false, cards:src.cards.map(c=>({...c})) });\n    this.updateDecks(decks);\n  }\n  del(idx){\n    if(!window.confirm('Excluir este baralho? Esta ação não pode ser desfeita.')) return;\n    const decks=this.state.decks.slice(); decks.splice(idx,1);\n    this.persist(decks);\n    this.setState({ decks, view:'home', editingIdx:-1, modal:null });\n  }\n\n  chipStyle(active,color){\n    const base='border-radius:20px;padding:5px 11px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;border:1px solid ';\n    if(active) return base+(color||'var(--gold,#c79a48)')+';background:'+(color||'var(--gold,#c79a48)')+';color:#16110a';\n    return base+'var(--line);background:transparent;color:var(--muted)';\n  }\n\n  exportText(d){\n    const S=this.state, C=Component; const out=[]; const total=this.total(d);\n    out.push('# '+d.nome+' — '+total+' cartas'); out.push('');\n    C.CATS.forEach(cat=>{\n      const items=d.cards.filter(c=>S.byId[c.id] && S.byId[c.id].categoria===cat).map(c=>({card:S.byId[c.id], qty:c.qty}))\n        .sort((a,b)=>(parseInt(a.card.pc)||99)-(parseInt(b.card.pc)||99) || a.card.nome.localeCompare(b.card.nome));\n      if(!items.length) return;\n      const sub=items.reduce((s,i)=>s+i.qty,0);\n      out.push('## '+cat+' ('+sub+')');\n      items.forEach(i=> out.push(i.qty+'x '+i.card.nome));\n      out.push('');\n    });\n    return out.join('\\n').trim();\n  }\n  doImport(){\n    const S=this.state;\n    const norm=s=>(s||'').toLowerCase().normalize('NFD').replace(/[\\u0300-\\u036f]/g,'').replace(/[^a-z0-9]/g,'');\n    const nameMap={}, numMap={};\n    S.cards.forEach(c=>{ nameMap[norm(c.nome)]=c.id; numMap[norm(c.num)]=c.id; });\n    const lines=(S.importText||'').split('\\n');\n    const acc={}; let missed=[]; let name='Baralho Importado';\n    lines.forEach(line=>{\n      let t=line.trim(); if(!t) return;\n      if(t.charAt(0)==='#'){ if(t.indexOf('# ')===0){ const m=t.replace(/^#+\\s*/,'').replace(/—.*$/,'').trim(); if(m && !/^\\d/.test(m)) name=m; } return; }\n      let qty=1, nm=t;\n      let mm=t.match(/^(\\d+)\\s*[x×]?\\s+(.+)$/i);\n      if(mm){ qty=parseInt(mm[1]); nm=mm[2]; }\n      else { mm=t.match(/^(.+?)\\s*[x×]\\s*(\\d+)$/i); if(mm){ nm=mm[1]; qty=parseInt(mm[2]); } }\n      nm=nm.trim();\n      let id = nameMap[norm(nm)]; if(id==null) id=numMap[norm(nm)];\n      if(id==null){ missed.push(nm); return; }\n      acc[id]=(acc[id]||0)+qty;\n    });\n    const cards=Object.keys(acc).map(id=>({ id:+id, qty:acc[id] }));\n    if(!cards.length){ this.setState({ importMsg:{ ok:false, text:'Nenhuma carta reconhecida. Use o formato \"3x Nome da Carta\".' } }); return; }\n    const decks=S.decks.slice();\n    decks.push({ nome:name, fav:false, isExample:false, cards });\n    this.persist(decks);\n    let msg=null;\n    this.setState({ decks, modal:null, view:'builder', editingIdx:decks.length-1, tab:'deck', importText:'', importMsg:null });\n    if(missed.length){ console.warn('Cartas não reconhecidas:', missed); }\n  }\n\n  imageUrl(card){\n    // ÚNICA fonte: imagem_url (card completo com moldura/arte/stats)\n    return card.imagem_url || '';\n  }\n  \n  renderVals(){\n    const S=this.state, C=Component;\n    const base = {\n      corOuro: (this.props && this.props.corOuro) || '#c79a48',\n      corPauBrasil: (this.props && this.props.corPauBrasil) || '#b14a3c',\n      loading: S.loading,\n      isHome: !S.loading && S.view==='home',\n      isBuilder: !S.loading && S.view==='builder' && !!this.curDeck(),\n      isMobile: S.isMobile,\n      showModal: !S.loading && !!S.modal,\n      goHome: ()=>this.setState({ view:'home', modal:null }),\n      newDeck: ()=>this.newDeck(),\n      openImport: ()=>this.setState({ modal:'import', importText:'', importMsg:null }),\n      closeModal: ()=>this.setState({ modal:null, copied:false }),\n      stop: (e)=>e.stopPropagation(),\n    };\n    if(S.loading) return base;\n    const showEffect = (this.props && this.props.mostrarEfeito) !== false;\n\n    // ---- HOME decks ----\n    const decks = S.decks.map((d,idx)=>{\n      const total=this.total(d);\n      const legal = total>=C.MIN && total<=C.MAX;\n      const seg = C.CATS.map(cat=>{\n        const n=d.cards.filter(c=>S.byId[c.id] && S.byId[c.id].categoria===cat).reduce((s,c)=>s+c.qty,0);\n        return { color:C.CATC[cat], pct: total ? (n/total*100) : 0, n };\n      }).filter(s=>s.n>0);\n      return { idx, nome:d.nome, isExample:!!d.isExample, fav:!!d.fav,\n        star: d.fav?'★':'☆', favColor: d.fav?'var(--gold,#c79a48)':'#4a4d7a',\n        total, legalText: legal?'Válido':(total<C.MIN?('Faltam '+(C.MIN-total)):('Excede '+(total-C.MAX))),\n        legalColor: legal?'#6fa8dc':'#d98a7e', legalBg: legal?'rgba(111,168,220,.16)':'rgba(217,138,126,.14)',\n        seg,\n        onOpen: ()=>this.setState({ view:'builder', editingIdx:idx, tab:'catalog' }),\n        onFav: (e)=>{ e.stopPropagation(); const ds=S.decks.slice(); ds[idx]={...ds[idx], fav:!ds[idx].fav}; this.updateDecks(ds); },\n        onDup: (e)=>{ e.stopPropagation(); this.duplicate(idx); },\n        onDel: (e)=>{ e.stopPropagation(); this.del(idx); } };\n    });\n    decks.sort((a,b)=>(b.fav-a.fav));\n    base.decks = decks; base.noDecks = decks.length===0;\n\n    // ---- MODAL ----\n    if(S.modal==='export' && this.curDeck()){\n      base.modalTitle='Exportar baralho'; base.isExport=true; base.isImport=false;\n      base.exportText=this.exportText(this.curDeck());\n      base.copyLabel = S.copied ? 'Copiado!' : 'Copiar lista';\n      base.copyExport = ()=>{ try{ navigator.clipboard.writeText(this.exportText(this.curDeck())); this.setState({copied:true}); }catch(e){} };\n    }\n    if(S.modal==='import'){\n      base.modalTitle='Importar lista'; base.isImport=true; base.isExport=false;\n      base.importText=S.importText;\n      base.onImportText=(e)=>this.setState({ importText:e.target.value });\n      base.doImport=()=>this.doImport();\n      base.hasImportMsg=!!S.importMsg;\n      base.importMsgText=S.importMsg?S.importMsg.text:'';\n      base.importMsgColor=(S.importMsg&&S.importMsg.ok)?'#6fa8dc':'#d98a7e';\n    }\n\n    // ---- BUILDER ----\n    if(S.view==='builder' && this.curDeck()){\n      const d=this.curDeck(); const total=this.total(d);\n      const legal = total>=C.MIN && total<=C.MAX;\n      base.deckName=d.nome; base.deckTotal=total; base.minDeck=C.MIN; base.maxDeck=C.MAX;\n      base.legalColor = legal?'#6fa8dc':'#d98a7e';\n      base.favStar = d.fav?'★':'☆'; base.favColor = d.fav?'var(--gold,#c79a48)':'#4a4d7a';\n      base.renameCur=(e)=>this.rename(e.target.value);\n      base.toggleFavCur=()=>{ const ds=S.decks.slice(); ds[S.editingIdx]={...ds[S.editingIdx], fav:!ds[S.editingIdx].fav}; this.updateDecks(ds); };\n      base.doExport=()=>this.setState({ modal:'export', copied:false });\n      base.delCur=()=>this.del(S.editingIdx);\n      base.deckEmpty = d.cards.length===0; base.hasCards = d.cards.length>0;\n\n      base.tabCatalog=()=>this.setState({tab:'catalog'});\n      base.tabDeck=()=>this.setState({tab:'deck'});\n      const tabBase='flex:1;padding:11px;background:none;border:none;font-family:inherit;font-weight:600;font-size:13px;cursor:pointer;border-bottom:2px solid ';\n      base.tabCatStyle=tabBase+(S.tab==='catalog'?'var(--gold,#c79a48);color:var(--text)':'transparent;color:var(--muted)');\n      base.tabDeckStyle=tabBase+(S.tab==='deck'?'var(--gold,#c79a48);color:var(--text)':'transparent;color:var(--muted)');\n      base.showCatalog = !S.isMobile || S.tab==='catalog';\n      base.showDeck = !S.isMobile || S.tab==='deck';\n      base.catPaneStyle = 'flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden';\n      base.deckPaneStyle = S.isMobile\n        ? 'flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;background:var(--bg2)'\n        : 'flex:none;width:400px;display:flex;flex-direction:column;overflow:hidden;background:var(--bg2);border-left:1px solid var(--line)';\n\n      // validations\n      const viol=[];\n      d.cards.forEach(c=>{ const card=S.byId[c.id]; if(card){ const mx=this.maxCopies(card); if(c.qty>mx) viol.push(card.nome+' ('+c.qty+'/'+mx+')'); } });\n      const raw=[\n        { ok: total>=C.MIN, text: total>=C.MIN?('Mínimo de '+C.MIN+' cartas atingido ('+total+')'):('Faltam '+(C.MIN-total)+' carta(s) para o mínimo de '+C.MIN) },\n        { ok: total<=C.MAX, text: total<=C.MAX?('Dentro do máximo de '+C.MAX+' cartas'):('Excede o máximo — remova '+(total-C.MAX)+' carta(s)') },\n        { ok: viol.length===0, text: viol.length===0?'Cópias por carta dentro do limite':('Excesso de cópias: '+viol.join(', ')) },\n      ];\n      base.validations = raw.map(v=>({ text:v.text, icon: v.ok?'✓':'!', color: v.ok?'#6fa8dc':'#d98a7e' }));\n\n      // groups\n      base.groups = C.CATS.map(cat=>{\n        const items=d.cards.filter(c=>S.byId[c.id] && S.byId[c.id].categoria===cat)\n          .map(c=>({ card:S.byId[c.id], qty:c.qty }))\n          .sort((a,b)=>(parseInt(a.card.pc)||99)-(parseInt(b.card.pc)||99) || a.card.nome.localeCompare(b.card.nome));\n        const count=items.reduce((s,i)=>s+i.qty,0);\n        return { cat, color:C.CATC[cat], count,\n          cards: items.map(it=>({ id:it.card.id, nome:it.card.nome,\n            pc:(parseInt(it.card.pc)>=1)?it.card.pc:'–', raridade:it.card.raridade, rarColor:C.RARC[it.card.raridade], qty:it.qty,\n            onInc:()=>this.inc(it.card.id), onDec:()=>this.dec(it.card.id) })) };\n      }).filter(g=>g.count>0);\n\n      // cost curve\n      const bk={}; for(let i=1;i<=7;i++) bk[i]=0; bk['–']=0;\n      d.cards.forEach(c=>{ const card=S.byId[c.id]; if(!card) return; const p=parseInt(card.pc); if(p>=1&&p<=7) bk[p]+=c.qty; else bk['–']+=c.qty; });\n      const maxB=Math.max(1, ...Object.keys(bk).map(k=>bk[k]));\n      base.costCurve=Object.keys(bk).map(k=>({ label:k, count:bk[k], pct: bk[k]/maxB*100 }));\n\n      // rarity dist\n      const rd={}; C.RARS.forEach(r=>rd[r]=0);\n      d.cards.forEach(c=>{ const card=S.byId[c.id]; if(card && rd[card.raridade]!=null) rd[card.raridade]+=c.qty; });\n      base.rarityDist=C.RARS.map(r=>({ rar:r, count:rd[r], color:C.RARC[r], pct: total?rd[r]/total*100:0 })).filter(x=>x.count>0);\n\n      // catalog\n      const q=(S.search||'').trim().toLowerCase();\n      const qmap={}; d.cards.forEach(c=>qmap[c.id]=c.qty);\n      let filtered=S.cards.filter(card=>{\n        if(S.fCat!=='Todas' && card.categoria!==S.fCat) return false;\n        if(S.fRar!=='Todas' && card.raridade!==S.fRar) return false;\n        if(S.fCol!=='Todas' && card.colecao!==S.fCol) return false;\n        if(S.fPc!=='Todas'){ const p=parseInt(card.pc); if(S.fPc==='–'){ if(p>=1) return false; } else if(String(p)!==S.fPc) return false; }\n        if(q){ if(!((card.nome||'').toLowerCase().includes(q) || (card.efeito||'').toLowerCase().includes(q) || (card.num||'').toLowerCase().includes(q))) return false; }\n        return true;\n      });\n      filtered.sort((a,b)=> C.CATS.indexOf(a.categoria)-C.CATS.indexOf(b.categoria) || (parseInt(a.pc)||99)-(parseInt(b.pc)||99) || a.nome.localeCompare(b.nome));\n      base.filtered=filtered.map(card=>{\n        const qty=qmap[card.id]||0; const ex=!!S.expanded[card.id];\n        const imgUrl=String(card.imagem_url || ''); const hasImg=imgUrl.length>0;\n        const tip=card.nome+' · PC '+((parseInt(card.pc)>=1)?card.pc:'–')+(((card.pa&&card.pa!=='--')||(card.pd&&card.pd!=='--'))?' · PA '+card.pa+'/PD '+card.pd:'')+' · '+card.raridade+' · '+card.categoria+(card.efeito?'\\n\\n'+card.efeito:'');\n        const hasStats=(card.pa && card.pa!=='--') || (card.pd && card.pd!=='--');\n        return { id:card.id, nome:card.nome, num:card.num, pcShow:(parseInt(card.pc)>=1)?card.pc:'–',\n          pa:card.pa, pd:card.pd, hasStats, categoria:card.categoria, catColor:C.CATC[card.categoria],\n          raridade:card.raridade, rarColor:C.RARC[card.raridade], efeito:card.efeito,\n          showEffectExpanded: !!card.efeito && ex,\n          showEffectClamp: !!card.efeito && !ex && showEffect,\n          qty, inDeck: qty>0, notInDeck: qty<=0, hasImg, noImg:!hasImg, imgUrl, tooltip:tip, cellBorder: qty>0?'var(--gold,#c79a48)':'var(--line)',\n          onAdd:()=>this.add(card.id), onInc:()=>this.inc(card.id), onDec:()=>this.dec(card.id),\n          onToggle:()=>this.setState(s=>({ expanded:{ ...s.expanded, [card.id]: !s.expanded[card.id] } })) };\n      });\n      base.resultCount=base.filtered.length; base.noResults=base.filtered.length===0;\n      base.search=S.search; base.onSearch=(e)=>this.setState({ search:e.target.value });\n      base.catChips=['Todas',...C.CATS].map(c=>({ label:c, on:()=>this.setState({fCat:c}), style:this.chipStyle(c===S.fCat, c==='Todas'?'':C.CATC[c]) }));\n      base.rarChips=['Todas',...C.RARS].map(r=>({ label:r, on:()=>this.setState({fRar:r}), style:this.chipStyle(r===S.fRar, r==='Todas'?'':C.RARC[r]) }));\n      base.colChips=['Todas',...C.COLS].map(c=>({ label:c, on:()=>this.setState({fCol:c}), style:this.chipStyle(c===S.fCol,'') }));\n      base.pcChips=['Todas','1','2','3','4','5','6','7','–'].map(p=>({ label:p, on:()=>this.setState({fPc:p}), style:this.chipStyle(p===S.fPc,'') }));\n      base.clearFilters=()=>this.setState({ fCat:'Todas', fRar:'Todas', fCol:'Todas', fPc:'Todas', search:'' });\n      base.fPc=S.fPc; base.fCol=S.fCol;\n      base.pcOptions=['Todas','1','2','3','4','5','6','7','–'];\n      base.colOptions=['Todas',...C.COLS];\n      base.onPcSel=(e)=>this.setState({ fPc:e.target.value });\n      base.onColSel=(e)=>this.setState({ fCol:e.target.value });\n    }\n    return base;\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
